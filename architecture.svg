<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700">
  <defs>
    <style>
      .box { fill: #0f172a; stroke: #334155; stroke-width: 2; rx: 12; ry: 12; }
      .box-alt { fill: #111827; stroke: #475569; stroke-width: 2; rx: 12; ry: 12; }
      .box-accent { fill: #1f2937; stroke: #38bdf8; stroke-width: 2; rx: 12; ry: 12; }
      .title { fill: #e2e8f0; font-family: "Segoe UI", sans-serif; font-size: 22px; font-weight: 700; }
      .label { fill: #e2e8f0; font-family: "Segoe UI", sans-serif; font-size: 14px; font-weight: 600; }
      .small { fill: #94a3b8; font-family: "Segoe UI", sans-serif; font-size: 12px; }
      .arrow { stroke: #94a3b8; stroke-width: 2.5; marker-end: url(#arrowhead); }
      .arrow-dashed { stroke: #38bdf8; stroke-width: 2.5; stroke-dasharray: 6 6; marker-end: url(#arrowhead); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1200" height="700" fill="#0b1220"/>
  <text x="360" y="40" class="title">Arquitetura e Fluxo de Atualizacao</text>

  <rect x="40" y="90" width="170" height="70" class="box"/>
  <text x="70" y="125" class="label">Usuario / Browser</text>

  <rect x="280" y="90" width="220" height="70" class="box-alt"/>
  <text x="305" y="120" class="label">GitHub Actions</text>
  <text x="305" y="142" class="small">workflow_dispatch</text>

  <rect x="300" y="190" width="200" height="70" class="box-alt"/>
  <text x="335" y="225" class="label">Runner Windows</text>

  <rect x="60" y="300" width="170" height="70" class="box"/>
  <text x="95" y="330" class="label">App Python</text>
  <text x="115" y="350" class="small">:8001</text>

  <rect x="260" y="300" width="170" height="70" class="box"/>
  <text x="285" y="330" class="label">App PowerShell</text>
  <text x="320" y="350" class="small">:8002</text>

  <rect x="470" y="300" width="150" height="70" class="box"/>
  <text x="515" y="330" class="label">Grafana</text>
  <text x="520" y="350" class="small">:3000</text>

  <rect x="700" y="280" width="190" height="90" class="box-alt"/>
  <text x="725" y="320" class="label">cloudflared</text>
  <text x="735" y="342" class="small">tuneis publicos</text>

  <rect x="940" y="250" width="200" height="60" class="box-accent"/>
  <text x="970" y="285" class="label">URL Publica</text>
  <text x="990" y="305" class="small">Python</text>

  <rect x="940" y="330" width="200" height="60" class="box-accent"/>
  <text x="970" y="365" class="label">URL Publica</text>
  <text x="980" y="385" class="small">PowerShell</text>

  <rect x="940" y="410" width="200" height="60" class="box-accent"/>
  <text x="970" y="445" class="label">URL Publica</text>
  <text x="995" y="465" class="small">Grafana</text>

  <rect x="60" y="420" width="370" height="90" class="box-alt"/>
  <text x="85" y="450" class="label">Observabilidade</text>
  <text x="85" y="472" class="small">/observability  /metrics  /export(.csv)</text>

  <rect x="460" y="420" width="460" height="90" class="box"/>
  <text x="485" y="450" class="label">Fluxo de atualizacao</text>
  <text x="485" y="472" class="small">1) Push codigo  2) Actions  3) Start apps/Grafana</text>
  <text x="485" y="492" class="small">4) Publica URLs  5) Usuarios acessam</text>

  <line x1="390" y1="160" x2="390" y2="190" class="arrow"/>
  <line x1="300" y1="225" x2="145" y2="300" class="arrow"/>
  <line x1="400" y1="260" x2="345" y2="300" class="arrow"/>
  <line x1="480" y1="260" x2="545" y2="300" class="arrow"/>

  <line x1="230" y1="335" x2="700" y2="325" class="arrow"/>
  <line x1="430" y1="335" x2="700" y2="325" class="arrow"/>
  <line x1="620" y1="335" x2="700" y2="325" class="arrow"/>

  <line x1="890" y1="320" x2="940" y2="280" class="arrow"/>
  <line x1="890" y1="330" x2="940" y2="360" class="arrow"/>
  <line x1="890" y1="340" x2="940" y2="440" class="arrow"/>

  <line x1="210" y1="125" x2="940" y2="280" class="arrow-dashed"/>
  <line x1="210" y1="125" x2="940" y2="360" class="arrow-dashed"/>
  <line x1="210" y1="125" x2="940" y2="440" class="arrow-dashed"/>
</svg>
