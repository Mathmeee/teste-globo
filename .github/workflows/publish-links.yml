name: Publish Access Links

on:
  workflow_dispatch:
    inputs:
      keep_alive_minutes:
        description: "Tempo para manter os links publicos ativos"
        required: true
        default: "60"

jobs:
  publish-links:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Start infra, publish and keep alive
        shell: pwsh
        env:
          KEEP_ALIVE_MINUTES: ${{ inputs.keep_alive_minutes }}
        run: |
          .\start-all.ps1
          .\scripts\start-public-tunnel.ps1

          $publicUrl = (Get-Content .run\public-url.txt -Raw).Trim()
          if ([string]::IsNullOrWhiteSpace($publicUrl)) {
            throw "A URL publica nao foi gerada."
          }

          .\scripts\start-grafana.ps1 -RootUrl "$publicUrl/grafana/"

          $script = @'
          import time
          import urllib.error
          import urllib.request

          def check(url: str) -> None:
              last = None
              for _ in range(20):
                  try:
                      request = urllib.request.Request(
                          url,
                          headers={
                              "Cache-Control": "no-cache",
                              "Pragma": "no-cache",
                              "User-Agent": "GitHubActionsValidation/1.0",
                          },
                      )
                      with urllib.request.urlopen(request, timeout=30) as resp:
                          code = resp.getcode()
                          if code < 500:
                              print(f"OK {url} -> {code}")
                              return
                          last = f"HTTP {code}"
                  except urllib.error.HTTPError as exc:
                      if exc.code < 500:
                          print(f"OK {url} -> {exc.code}")
                          return
                      last = f"HTTP {exc.code}"
                  except Exception as exc:
                      last = str(exc)
                  time.sleep(5)
              raise RuntimeError(f"URL invalida: {url} -> {last}")

          base = "{base}".rstrip("/")
          urls = [
              f"{base}/",
              f"{base}/python",
              f"{base}/python/time",
              f"{base}/python/observability",
              f"{base}/python/export",
              f"{base}/python/export.csv",
              f"{base}/powershell",
              f"{base}/powershell/time",
              f"{base}/powershell/observability",
              f"{base}/powershell/export",
              f"{base}/powershell/export.csv",
              f"{base}/grafana/login",
          ]

          for url in urls:
              check(url)
          '@
          $script = $script.Replace("{base}", $publicUrl)
          $script | python -

          $publicUrl = $publicUrl.TrimEnd("/")
          @"
          ## Links de acesso

          Esses links ficam ativos enquanto este job estiver em execucao.

          ### Portal unico
          - Portal: $publicUrl/
          - Python texto fixo: $publicUrl/python
          - Python horario: $publicUrl/python/time
          - Python observabilidade: $publicUrl/python/observability
          - Python export JSON: $publicUrl/python/export
          - Python export CSV: $publicUrl/python/export.csv
          - PowerShell texto fixo: $publicUrl/powershell
          - PowerShell horario: $publicUrl/powershell/time
          - PowerShell observabilidade: $publicUrl/powershell/observability
          - PowerShell export JSON: $publicUrl/powershell/export
          - PowerShell export CSV: $publicUrl/powershell/export.csv
          - Grafana login (primeiro passo): $publicUrl/grafana/login
          - Grafana dashboard (apos login): $publicUrl/grafana/d/globo-overview/globo-overview

          Credenciais Grafana:
          - usuario: admin
          - senha: admin
          "@ | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Encoding utf8 -Append

          Write-Host "::notice title=Portal::$publicUrl/"
          Write-Host "::notice title=Grafana::$publicUrl/grafana/login"

          $minutes = [int]$env:KEEP_ALIVE_MINUTES
          Write-Host "Mantendo a infraestrutura ativa por $minutes minuto(s)..."
          Start-Sleep -Seconds ($minutes * 60)

      - name: Cleanup
        if: always()
        shell: pwsh
        run: .\stop-all.ps1
